<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omega Forge – Chronovium Engine</title>
<style>
body { font-family: Arial; background:#0a0a0f; color:#e5e7eb; margin:0; }
.container { padding:16px; }
.card { background:#111827; padding:16px; margin-bottom:12px; border-radius:12px; }
.title { font-size:20px; font-weight:bold; }
.sub { opacity:.7; margin-bottom:8px; }
button { padding:10px 14px; border:none; border-radius:8px; background:#6366f1; color:white; }
</style>
</head>
<body>
<div class="container">
<div class="card">
<div class="title">OMEGA FORGE</div>
<div class="sub">Chronovium Engine Active</div>
<button onclick="generateWorkout()">Generate Directive</button>
</div>
<div id="output"></div>
</div>
<script>

const anchors = {
  lower: ["Snatch Grip Deadlift","Bulgarian Split Squat"],
  upper: ["Bench Press","Chest Supported Row"],
  full: ["Landmine Squat","Carry"]
};

const pools = {
  lower_secondary:["RDL","Reverse Lunge","Goblet Squat","Step Up"],
  upper_secondary:["Close Grip Bench","Incline DB Press","Lat Pulldown"],
  landmine:["Landmine Press","Landmine Rotation","Landmine Thruster","Landmine Clean"],
  kb:["KB Swing","KB Dead Stop Swing","KB Clean","Goblet Squat"],
  core:["Dead Bug","Pallof Press","Side Plank","Bear Hold"]
};

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function scheme(week){
  if(week===1) return {type:"paused",sets:"4-5",reps:"4-6"};
  if(week===2) return {type:"power",sets:"5-8",reps:"3"};
  if(week===3) return {type:"hypertrophy",sets:"4",reps:"8-12"};
  return {type:"deload",sets:"3",reps:"5-8"};
}

function buildDay(type,week){
  const s = scheme(week);

  let coreA, coreB;

  if(type==='lower'){
    coreA = "Snatch Grip Deadlift";
    coreB = "Bulgarian Split Squat";
  }
  if(type==='upper'){
    coreA = "Bench Press";
    coreB = "Chest Supported Row";
  }
  if(type==='full'){
    coreA = "Landmine Squat";
    coreB = "Carry";
  }

  return {
    coreA,
    coreB,
    secondary: pick(type==='lower'?pools.lower_secondary:pools.upper_secondary),
    landmine: pick(pools.landmine),
    kb: pick(pools.kb),
    core: pick(pools.core),
    scheme:s
  };
}

function generateWorkout(){
  const week = Math.ceil(Math.random()*4);

  const lower = buildDay('lower',week);
  const upper = buildDay('upper',week);
  const full = buildDay('full',week);

  render([lower,upper,full],week);
}

function render(days,week){
  const el = document.getElementById('output');
  el.innerHTML = '';

  days.forEach((d,i)=>{
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `
      <div class="title">Day ${i+1}</div>
      <div class="sub">Week ${week} – ${d.scheme.type}</div>
      <div><b>${d.coreA}</b></div>
      <div><b>${d.coreB}</b></div>
      <div>${d.secondary}</div>
      <div>${d.landmine}</div>
      <div>${d.kb}</div>
      <div>${d.core}</div>
    `;
    el.appendChild(card);
  });
}

</script>
</body>
</html>
