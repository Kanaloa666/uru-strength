<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vibranium Protocol</title>

<style>

body{
font-family:Arial;
background:#0a0f18;
color:white;
padding:30px;
}

h1{
color:#7ef2ff;
}

button{
padding:10px 16px;
margin:5px;
background:#66a3ff;
border:none;
border-radius:6px;
cursor:pointer;
}

input{
padding:6px;
width:120px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #222;
padding:10px;
}

th{
background:#111;
color:#7ef2ff;
}

.workoutButton{
background:#222;
color:white;
}

.activeWorkout{
background:#66a3ff;
color:black;
}

.section{
margin-top:20px;
}

</style>
</head>


<body>

<h1 id="protocolTitle">Month Protocol</h1>

<div>
<button onclick="changeWeek(-1)">Previous Week</button>
<button onclick="changeWeek(1)">Next Week</button>
</div>

<h2 id="weekTitle"></h2>

<div id="workoutButtons"></div>

<div class="section">
<h3 id="workoutTitle"></h3>
<p id="workoutSubtitle"></p>
</div>

<div class="section">
<h3>Warmup</h3>
<ul id="warmupList"></ul>
</div>

<div class="section">
<h3>Session Intent</h3>
<ul id="focusList"></ul>
</div>

<table>

<thead>
<tr>
<th>Directive</th>
<th>Charge</th>
<th>Target Load</th>
<th>Actual</th>
<th>Notes</th>
</tr>
</thead>

<tbody id="liftTable"></tbody>

</table>

<script>


function round5(x){
return Math.round(x/5)*5
}

let data=JSON.parse(localStorage.getItem("vibraniumProtocol"))||{

week:1,
workout:0,

bench:225,
squat:315,
dead:285,

landmine:45,
kettlebell:35,

actual:{}

}

function save(){

localStorage.setItem("vibraniumProtocol",JSON.stringify(data))

}


function changeWeek(dir){

data.week+=dir

if(data.week<1)data.week=4
if(data.week>4)data.week=1

data.workout=0

render()

save()

}


function selectWorkout(i){

data.workout=i

render()

save()

}



function buildProgram(){

let bench=data.bench
let squat=data.squat
let dead=data.dead
let land=data.landmine
let kb=data.kettlebell

let pct=(v,p)=>round5(v*p)

return{

1:[

{
name:"DOOM SPEAKS",
subtitle:"Failure requires permission. Today you are not granting it.",

warmup:[
"3 min incline walk",
"Band shoulder activation x15",
"Hip hinge x10",
"Bench ramp sets",
"Deadlift ramp sets"
],

focus:[
"Press with authority",
"Deadlift with tension",
"Landmine smooth",
"Kettlebell explosive"
],

lifts:[

{name:"Bench Press",charge:"5x5",weight:pct(bench,.72),notes:"Own the groove"},
{name:"Snatch Grip Deadlift",charge:"4x5",weight:pct(dead,.68),notes:"Upper back strong"},
{name:"Landmine Press",charge:"4x8",weight:land+20,notes:"Drive up"},
{name:"Kettlebell Swing",charge:"4x15",weight:kb,notes:"Snap hips"}

]

},

{
name:"COLOSSUS MODE",
subtitle:"Heavy. Durable. Irritatingly unstoppable.",

warmup:[
"Bike 3 min",
"Goblet squat pry",
"Adductor rockback",
"Squat ramp",
"Bench ramp"
],

focus:[
"Squat stable",
"Bench controlled",
"Row strict",
"Carry tall"
],

lifts:[

{name:"Back Squat",charge:"5x5",weight:pct(squat,.72),notes:"Depth clean"},
{name:"Bench Press",charge:"4x6",weight:pct(bench,.75),notes:"Bar path consistent"},
{name:"Landmine Row",charge:"4x10",weight:land+30,notes:"Elbow drive"},
{name:"Kettlebell Carry",charge:"4x40sec",weight:kb,notes:"Stay braced"}

]

},

{
name:"HULK PROBLEM",
subtitle:"Subtlety has been cancelled.",

warmup:[
"Movement prep",
"Glute bridge",
"Tspine opener",
"Deadlift ramp",
"Squat ramp"
],

focus:[
"Pull violently",
"Squat disciplined",
"Landmine smooth",
"Kettlebell conditioning"
],

lifts:[

{name:"Snatch Grip Deadlift",charge:"5x5",weight:pct(dead,.72),notes:"Explosive"},
{name:"Back Squat",charge:"4x6",weight:pct(squat,.70),notes:"Control depth"},
{name:"Landmine Press",charge:"4x10",weight:land+15,notes:"Strong lockout"},
{name:"Kettlebell Goblet Squat",charge:"4x12",weight:kb,notes:"Stay upright"}

]

}

]

}

}



function render(){

let program=buildProgram()

let week=program[data.week]

document.getElementById("weekTitle").innerText="Week "+data.week

let buttons=document.getElementById("workoutButtons")

buttons.innerHTML=""

week.forEach((w,i)=>{

let b=document.createElement("button")

b.className="workoutButton"

if(i==data.workout)b.classList.add("activeWorkout")

b.innerText=w.name

b.onclick=()=>selectWorkout(i)

buttons.appendChild(b)

})

let workout=week[data.workout]

document.getElementById("workoutTitle").innerText=workout.name
document.getElementById("workoutSubtitle").innerText=workout.subtitle


let warm=document.getElementById("warmupList")

warm.innerHTML=""

workout.warmup.forEach(x=>{
let li=document.createElement("li")
li.innerText=x
warm.appendChild(li)
})


let focus=document.getElementById("focusList")

focus.innerHTML=""

workout.focus.forEach(x=>{
let li=document.createElement("li")
li.innerText=x
focus.appendChild(li)
})


let table=document.getElementById("liftTable")

table.innerHTML=""

workout.lifts.forEach((lift,i)=>{

let key="w"+data.week+"d"+data.workout+"l"+i

let actual=data.actual[key]||""

let row=document.createElement("tr")

row.innerHTML=`

<td>${lift.name}</td>
<td>${lift.charge}</td>
<td>${lift.weight}</td>
<td><input value="${actual}" onchange="saveActual('${key}',this.value)"></td>
<td>${lift.notes}</td>

`

table.appendChild(row)

})

}


function saveActual(key,val){

data.actual[key]=val

if(val.toLowerCase().includes("easy")){

data.bench+=5
data.squat+=5
data.dead+=5

}

if(val.toLowerCase().includes("miss")){

data.bench-=5
data.squat-=5
data.dead-=5

}

save()

}



render()

</script>

</body>
</html>
